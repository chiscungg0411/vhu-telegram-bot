services:
  - type: web
    name: vhu-telegram-bot
    env: node
    plan: free
    buildCommand: apt-get update && apt-get install -y chromium-browser libxss1 libxtst6 libx11-xcb1 libxcomposite1 libxcursor1 libxdamage1 libxi6 libatk1.0-0 libatk-bridge2.0-0 libgtk-3-0 libgbm1 libasound2 && npm install
    startCommand: node bot.js
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: VHU_EMAIL
        sync: false
      - key: VHU_PASSWORD
        sync: false
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "true"
